services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-insight}
      POSTGRES_USER: ${POSTGRES_USER:-insight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insight}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-insight}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-insight}
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PORTAL_URL: ${PORTAL_URL:-}
      # Valfritt — sätt först när du kör flera backend-repliker (se redis-tjänsten nedan).
      REDIS_URL: ${REDIS_URL:-}
      GRAPH_TENANT_ID: ${GRAPH_TENANT_ID:-}
      GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID:-}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET:-}
      GRAPH_SENDER: ${GRAPH_SENDER:-noreply@terafalk.com}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@terafalk.com}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-changeme}
      MS_APP_CLIENT_ID: ${MS_APP_CLIENT_ID:-}
      MS_APP_CLIENT_SECRET: ${MS_APP_CLIENT_SECRET:-}
      MS_APP_REDIRECT_URI: ${MS_APP_REDIRECT_URI:-}
    volumes:
      - report_output:/app/reports_output
      - order_documents:/app/order_documents
      - ticket_attachments:/app/ticket_attachments
    expose:
      - "8000"
    networks:
      - internal
      - npm_proxy

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - internal
      - npm_proxy

  # ── Valfritt: Redis för fler-replikskörning ──────────────────────────────────
  # Behövs INTE för en enda backend-replik. Aktivera först när du skalar
  # horisontellt (delad rate limit + schemaläggar-lås mot dubbla rapporter/mail):
  #   1. Avkommentera tjänsten nedan.
  #   2. Sätt REDIS_URL=redis://redis:6379/0 i .env.
  #   3. docker compose up -d
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   command: ["redis-server", "--save", "", "--appendonly", "no"]
  #   networks:
  #     - internal
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5

networks:
  internal:
    driver: bridge
  npm_proxy:
    external: true

volumes:
  pg_data:
  report_output:
  order_documents:
  ticket_attachments:
